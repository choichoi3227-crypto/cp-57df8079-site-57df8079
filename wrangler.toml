# CloudPress WordPress Worker 배포 설정
# PHP_RUNNER Service Binding으로 즉시 WordPress 실행
# 데이터베이스: GitHub 레포 내 _db/wordpress.db (SQLite)
name               = "cp-57df8079-wp"
main               = "worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 50000

# ── 캐시 (KV) ────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "b5d35937ba194cdbbbf85353df1804a7"

# ── PHP_RUNNER Service Binding ────────────────────────────────────────────────
# php-runner Worker를 Service Binding으로 연결 (즉시 WP 실행)
[[services]]
binding = "PHP_RUNNER"
service = "cp-57df8079-wp-php"

# ── 환경변수 ─────────────────────────────────────────────────────────────────
[vars]
SITE_ID      = "57df8079-7ce9-49ce-bc1b-5f271e2bd971"
GH_OWNER     = "choichoi3227-crypto"
GH_REPO      = "cp-57df8079-site-57df8079"
GH_PAGES_URL = "https://choichoi3227-crypto.github.io/cp-57df8079-site-57df8079"

# GITHUB_TOKEN은 secret으로 설정 (wrangler secret put GITHUB_TOKEN)
